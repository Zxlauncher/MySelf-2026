<svg viewBox="0 0 800 60" xmlns="http://www.w3.org/2000/svg">

<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<style>
.text {
  font: bold 28px Arial, sans-serif;
  letter-spacing:4px;
  fill:#00f7ff;
  filter:url(#glow);
}
</style>

<rect width="100%" height="100%" fill="#0d1117" rx="10"/>

<text y="40" class="text">
  <animate attributeName="x" from="800" to="-900" dur="12s" repeatCount="indefinite"/>
  <animate attributeName="fill" values="#00f7ff;#ff00ff;#00f7ff" dur="3s" repeatCount="indefinite"/>
  ★ THANK YOU FOR VISITING ★ THANK YOU FOR VISITING ★ THANK YOU FOR VISITING ★
</text>

</svg>
